<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>이벤트 파밍 계산기</title>
    <link rel="stylesheet" href="style.css">
    <!-- 외부 라이브러리 -->
    <script src="https://cdn.jsdelivr.net/npm/javascript-lp-solver@0.4.24/src/solver.min.js"></script>
    <!-- 애플리케이션 스크립트 -->
    <script src="script.js" defer></script>
</head>
<body>

<!-- 숨겨진 파일 입력 필드 -->
<input type="file" id="fileInput" style="display:none" accept=".json">

<div class="container">
    <header>
        <h1>이벤트 파밍 계산기</h1>
        <p>제미나이를 갈궈서 만들었기에 계산이 부정확하거나 사이트에 오류가 있을 수 있습니다, 버그 제보 받습니다...</p>
        <div class="header-actions">
            <a href="https://github.com/MellDa1024/ba-event-calculator/issues" target="_blank" class="btn-action">
                <svg height="20" width="20" viewBox="0 0 16 16" version="1.1" aria-hidden="true" fill="currentColor">
                    <path d="M8 0c4.42 0 8 3.58 8 8a8.013 8.013 0 0 1-5.45 7.59c-.4.08-.55-.17-.55-.38 0-.27.01-1.13.01-2.2 0-.75-.25-1.23-.54-1.48 1.78-.2 3.65-.88 3.65-3.95 0-.88-.31-1.59-.82-2.15.08-.2.36-1.02-.08-2.12 0 0-.67-.22-2.2.82-.64-.18-1.32-.27-2-.27-.68 0-1.36.09-2 .27-1.53-1.03-2.2-.82-2.2-.82-.44 1.1-.16 1.92-.08 2.12-.51.56-.82 1.28-.82 2.15 0 3.06 1.86 3.75 3.64 3.95-.23.2-.44.55-.51 1.07-.46.21-1.61.55-2.33-.66-.15-.24-.6-.83-1.23-.82-.67.01-.27.38.01.53.34.19.73.9.82 1.13.16.45.68 1.31 2.69.94 0 .67.01 1.3.01 1.49 0 .21-.15.45-.55.38A7.995 7.995 0 0 1 0 8c0-4.42 3.58-8 8-8Z"></path>
                </svg>
                <span>버그 제보</span>
            </a>
            <button class="theme-toggle btn-action">
                <span id="themeIcon">☀️</span> <span id="themeText">Light Mode</span>
            </button>
        </div>
    </header>

    <div class="wrap">
        <main class="col">
            <!-- 1. 재화 설정 -->
            <section class="card">
                <div class="sec-title">이벤트 재화</div>
                <div id="itemList" class="grid-dynamic"></div>
                <button class="btn btn-add" id="addItemBtn">+ 새로운 재화 추가</button>
            </section>

            <!-- 2. 주요 설정 대시보드 -->
            <div class="grid-3">
                <section class="card">
                    <div class="sec-title">보유 수량</div>
                    <div id="existingList" style="display:flex;flex-direction:column;gap:12px"></div>
                </section>
                <section class="card">
                    <div class="sec-title">보너스 (%)</div>
                    <div id="bonusList" style="display:flex;flex-direction:column;gap:12px"></div>
                </section>
                <section class="card">
                    <div class="sec-title">목표 수량</div>
                    <div id="reqList" style="display:flex;flex-direction:column;gap:12px"></div>
                </section>
            </div>

            <!-- 3. 스테이지 드롭 정보 -->
            <section class="card">
                <div class="sec-title">스테이지 드롭 정보</div>
                <div id="stageList"></div>
            </section>
        </main>

        <aside class="sticky-col">
            <div class="aside-grid">
                <!-- 사이드바 왼쪽: 최적화 및 결과 -->
                <section class="card">
                    <div class="sec-title">파밍 최적화</div>
                    <button class="btn btn-generate" id="runOptBtn">계산하기</button>
                    <div id="calcStatus" class="calc-status"></div>
                    
                    <div id="resultArea" class="result-area" style="display:none">
                        <div class="sec-title" style="margin-top:10px">최적 파밍 계획</div>
                        <div id="resultStages"></div>
                        <div id="resultTotal" class="res-total"></div>
                        <div id="resultValidation" class="res-validation"></div>
                    </div>
                </section>

                <!-- 사이드바 오른쪽: JSON 데이터 관리 -->
                <section class="card">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 12px">
                        <div style="display:flex; flex-direction:column; gap:4px">
                            <div class="sec-title" style="margin:0">JSON 데이터</div>
                            <span id="lastUpdateLabel" style="font-size: 0.7rem; color: var(--text-sub); font-family: 'Fira Code', monospace; font-weight: 600;"></span>
                        </div>
                        <button class="btn btn-cp">복사</button>
                    </div>

                    <pre id="preview">{}</pre>
                    <!-- 설정 관리 버튼 그룹 (가로 2열 배치) -->
                    <div class="btn-group-row">
                        <button class="btn btn-dl" id="downloadBtn">파일 저장</button>
                        <button class="btn btn-load">파일 불러오기</button>
                    </div>
                    <div id="dataStatus" class="calc-status"></div>
                    </section>

            </div>
        </aside>
    </div>
</div>

<!-- 템플릿 정의 -->
<template id="item-card-template">
    <div class="item-card">
        <div class="item-head">
            <span class="item-title"></span>
            <button class="btn btn-rm">삭제</button>
        </div>
        <div class="grid-2">
            <div class="row">
                <label>ID</label>
                <input type="text" class="item-id-input">
            </div>
            <div class="row">
                <label>표시 이름</label>
                <input type="text" class="item-name-input">
            </div>
        </div>
    </div>
</template>

<template id="stage-card-template">
    <div class="item-card">
        <div class="item-head">
            <span class="item-title"></span>
            <label class="switch">
                <input type="checkbox" class="stage-toggle">
                <span class="slider"></span>
            </label>
        </div>
        <div class="row">
            <label>AP 소모량</label>
            <input type="number" class="stage-ap-input" min="0">
        </div>
        <div class="stage-item-grid"></div>
    </div>
</template>

<template id="input-row-template">
    <div class="row">
        <label></label>
        <input type="number" min="0">
    </div>
</template>

<template id="result-stage-template">
    <div class="res-stage">
        <div class="res-stage-head">
            <span class="stage-name"></span>
            <span class="stage-runs"></span>
        </div>
        <div class="res-item"></div>
    </div>
</template>

<template id="result-validation-template">
    <div class="val-item">
        <div class="val-row">
            <span class="val-main"></span>
            <span class="val-status"></span>
        </div>
        <div class="val-row">
            <span class="val-detail"></span>
            <span class="val-excess"></span>
        </div>
    </div>
</template>

<template id="spinner-template">
    <span class="spinner"></span> 계산 중...
</template>

</body>
</html>
